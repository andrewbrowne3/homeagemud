{% extends "webclient/base.html" %}

{% block client %}

<!-- Basic toolbar -->
<div id="toolbar">
  <button id="create-scene-btn" class="btn btn-sm btn-outline-primary" type="button">Create Scene</button>
  <button id="refresh-scenes-btn" class="btn btn-sm btn-outline-secondary" type="button">Refresh</button>
</div>

<!-- Command button bar -->
<div id="commandbar" style="padding: 4px 8px; border-bottom: 1px solid #444;"></div>

<!-- "Main" Content -->
<div id="main" class="split split-vertical" data-role-default>
  <div id="main-sub" class="split-sub">
    <div id="messagewindow"></div>
  </div>
</div>

<!-- Scene sidebar -->
<div id="scene-panel" class="split split-vertical" style="padding: 8px; border-left: 1px solid #444; min-width: 220px;">
  <h4 style="margin: 0 0 8px 0;">Active Scenes</h4>
  <ul id="scene-list" style="list-style: none; padding: 0; margin: 0;"></ul>
  <p id="scene-empty" style="color: #888; font-size: 0.9em; display: none;">No active scenes yet.</p>
</div>

<!-- "Input" Pane -->
<div id="input" class="split split-vertical" data-role-input data-update-append>
  <div id="inputform" class="wrapper">
    <div id="prompt" class="prompt">
    </div>
    <div id="inputcontrol" class="input-group">
      <textarea id="inputfield" type="text" class="form-control"></textarea>
      <span class="input-group-btn">
        <button class="btn btn-large btn-outline-primary" id="inputsend" type="button" value="">&gt;</button>
      </span>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
{% load static %}
<script src="{% static 'webclient/js/plugins/scenes.js' %}" type="text/javascript"></script>
<script src="{% static 'webclient/js/plugins/commandbar.js' %}" type="text/javascript"></script>
{% endblock %}
